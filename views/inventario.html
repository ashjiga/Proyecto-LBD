<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>Inventario</h1>
        <a href="/" class="btn">Volver</a>
    </header>

    <div class="contenedor">

        <h2>Inventario</h2>
        <table>
            <tr>
                <th>Producto</th>
                <th>Talla</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
            {% for i in inventario %}
            <tr>
                <form action="/inventario/actualizar" method="POST">
                    <input type="hidden" name="id" value="{{ i[0] }}">
                    <td>{{ i[1] }}</td>
                    <td>{{ i[2] }}</td>
                    <td>
                        <input type="number" name="stock" value="{{ i[3] }}" min="0">
                    </td>
                    <td>
                        <button type="submit">Actualizar</button>
                    </td>
                </form>
            </tr>
            {% else %}
            <tr>
                <td colspan="4">No hay productos en inventario.</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</body>

</html>
