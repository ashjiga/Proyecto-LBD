<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Facturas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>Facturas</h1>
        <a href="/" class="btn">Volver</a>
    </header>

    <div class="contenedor">

        <table>
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Cliente</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>
                {% for f in facturas %}
                <tr>

                    <td>{{ f[1] }}</td>
                    <td>{{ f[2] }}</td>
                    <td>{{ f[3].strftime('%d/%m/%Y') }}</td>
                    <td>₡{{ f[4] }}</td>

                    <td>
                        <form action="{{ url_for('facturas.actualizar_factura', id=f[0]) }}" method="POST">
                            <select name="estado">
                                <option value="Pagada" {% if f[5]=='Pagada' %}selected{% endif %}>Pagada</option>
                                <option value="Pendiente" {% if f[5]=='Pendiente' %}selected{% endif %}>Pendiente
                                </option>
                                <option value="Anulada" {% if f[5]=='Anulada' %}selected{% endif %}>Anulada</option>
                            </select>
                    </td>

                    <td>
                        <button type="submit" class="btn">Actualizar</button>
                        </form>

                        <!-- CORREGIDO -->
                        <a href="{{ url_for('detalle_facturas.detalle_facturas', id=f[0]) }}" class="btn">
                            Ver detalle
                        </a>
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>

    </div>

</body>

</html>
