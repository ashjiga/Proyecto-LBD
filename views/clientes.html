<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>Clientes</h1>
        <a href="/" class="btn">Volver</a>
    </header>

    <div class="contenedor">

        <h2>Registrar Cliente</h2>
        <form action="/insertar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="apellido" placeholder="Apellido" required>
            <input type="text" name="telefono" placeholder="Teléfono">
            <input type="email" name="email" placeholder="Email">
            <button type="submit" class="btn">Guardar</button>
        </form>

        <h2>Lista</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c[0] }}</td>

                    <td>
                        <input type="text" name="nombre" value="{{ c[1] }}" form="form-upd-cli-{{ c[0] }}" required>
                    </td>

                    <td>
                        <input type="text" name="apellido" value="{{ c[2] }}" form="form-upd-cli-{{ c[0] }}" required>
                    </td>

                    <td>
                        <input type="text" name="telefono" value="{{ c[3] }}" form="form-upd-cli-{{ c[0] }}">
                    </td>

                    <td>
                        <input type="text" name="email" value="{{ c[4] }}" form="form-upd-cli-{{ c[0] }}">
                    </td>

                    <td>
                        <button type="submit" class="btn" form="form-upd-cli-{{ c[0] }}">
                            Actualizar
                        </button>

                        <button type="submit" class="btn btn-danger" form="form-del-cli-{{ c[0] }}"
                            onclick="return confirm('¿Eliminar cliente?')">
                            Eliminar
                        </button>
                    </td>
                </tr>

                <form id="form-upd-cli-{{ c[0] }}" action="/actualizar" method="POST">
                    <input type="hidden" name="id" value="{{ c[0] }}">
                </form>

                <form id="form-del-cli-{{ c[0] }}" action="/eliminar" method="POST">
                    <input type="hidden" name="id" value="{{ c[0] }}">
                </form>

                {% else %}
                <tr>
                    <td colspan="6">No hay clientes registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</body>

</html>
