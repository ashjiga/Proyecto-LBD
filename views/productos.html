<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>Productos</h1>
        <a href="/" class="btn">Volver</a>
    </header>

    <div class="contenedor">

        <h2>Agregar Producto</h2>
        <form action="/productos/agregar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="descripcion" placeholder="Descripción">

            <select name="id_categoria" required>
                <option value="">Seleccionar categoría</option>
                {% for c in categorias %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>

            <input type="number" name="precio" placeholder="Precio" step="0.01" min="0" required>

            <button type="submit" class="btn">Guardar</button>
        </form>

        <h2>Lista</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p[0] }}</td>

                    <td>
                        <input type="text" name="nombre" value="{{ p[1] }}" form="form-upd-{{ p[0] }}" required>
                    </td>

                    <td>
                        <input type="text" name="descripcion" value="{{ p[2] }}" form="form-upd-{{ p[0] }}">
                    </td>

                    <td>
                        <select name="id_categoria" form="form-upd-{{ p[0] }}" required>
                            {% for c in categorias %}
                            <option value="{{ c[0] }}" {% if c[0]==p[5] %}selected{% endif %}>
                                {{ c[1] }}
                            </option>
                            {% endfor %}
                        </select>
                    </td>

                    <td>
                        <input type="number" name="precio" value="{{ p[4] }}" step="0.01" min="0"
                            form="form-upd-{{ p[0] }}" required>
                    </td>

                    <td>
                        <button type="submit" class="btn" form="form-upd-{{ p[0] }}">
                            Actualizar
                        </button>

                        <button type="submit" class="btn btn-danger" form="form-del-{{ p[0] }}"
                            onclick="return confirm('¿Eliminar producto?')">
                            Eliminar
                        </button>
                    </td>
                </tr>

                <form id="form-upd-{{ p[0] }}" action="/productos/actualizar" method="POST">
                    <input type="hidden" name="id" value="{{ p[0] }}">
                </form>

                <form id="form-del-{{ p[0] }}" action="/productos/eliminar" method="POST">
                    <input type="hidden" name="id" value="{{ p[0] }}">
                </form>

                {% else %}
                <tr>
                    <td colspan="6">No hay productos registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</body>

</html>
